<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Simulator ⚽ 球星匹配</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-left">
        <span class="logo">⚽</span>
        <h1>FOOTBALL <span class="accent">SIMULATOR</span></h1>
      </div>
      <div class="header-right">
        <span class="subtitle">五大联赛球星匹配系统</span>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 左侧：输入区 -->
      <section class="input-panel">
        <!-- 球员查询入口 -->
        <div class="search-section">
          <h3 class="search-title">🔎 球员数值查询</h3>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="输入球员名字，如 梅西、哈兰德、萨拉赫..." autocomplete="off" onkeydown="if(event.key==='Enter')searchPlayer()">
            <button class="search-btn" onclick="searchPlayer()">查询</button>
          </div>
          <div class="search-results" id="search-results"></div>
        </div>

        <h2 class="panel-title" style="margin-top:20px;">📋 描述你自己</h2>
        <p class="panel-desc">填写你的特征，系统将为你匹配最相似的五大联赛球星</p>

        <div class="form-grid">
          <div class="form-group">
            <label>身高 (cm)</label>
            <input type="number" id="input-height" placeholder="例如 178" min="150" max="210">
          </div>
          <div class="form-group">
            <label>体重 (kg)</label>
            <input type="number" id="input-weight" placeholder="例如 72" min="45" max="120">
          </div>
          <div class="form-group">
            <label>年龄</label>
            <input type="number" id="input-age" placeholder="例如 25" min="16" max="45">
          </div>
          <div class="form-group">
            <label>惯用脚</label>
            <select id="input-foot">
              <option value="">请选择</option>
              <option value="左脚">左脚</option>
              <option value="右脚">右脚</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>场上位置（可选）</label>
            <div class="position-btns" id="position-btns">
              <button class="pos-btn" data-pos="ST">⚔️ 前锋</button>
              <button class="pos-btn" data-pos="CAM">🎯 中场</button>
              <button class="pos-btn" data-pos="CB">🛡️ 后卫</button>
              <button class="pos-btn" data-pos="GK">🧤 门将</button>
            </div>
          </div>
          <div class="form-group full-width">
            <label>风格标签（可选，可多选）</label>
            <div class="style-btns" id="style-btns">
              <button class="style-btn" data-style="速度型">⚡ 速度型</button>
              <button class="style-btn" data-style="技术型">🎨 技术型</button>
              <button class="style-btn" data-style="力量型">💪 力量型</button>
              <button class="style-btn" data-style="终结者">🎯 终结者</button>
              <button class="style-btn" data-style="组织核心">🧠 组织核心</button>
            </div>
          </div>
        </div>

        <!-- 球员范围筛选 -->
        <div class="filter-row">
          <label>匹配范围</label>
          <div class="filter-btns" id="filter-btns">
            <button class="filter-btn active" data-filter="all">🌐 全部</button>
            <button class="filter-btn" data-filter="current">⚽ 现役</button>
            <button class="filter-btn" data-filter="legend">👑 传奇</button>
          </div>
        </div>

        <button class="match-btn" id="match-btn" onclick="startMatch()">
          <span class="btn-icon">🔍</span> 开始匹配
        </button>
      </section>

      <!-- 右侧：结果区 -->
      <section class="result-panel" id="result-panel">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⚽</div>
          <h3>等待匹配...</h3>
          <p>填写左侧信息，点击"开始匹配"</p>
          <p style="margin-top:8px;font-size:13px;color:var(--text-muted);">或直接在上方搜索球员查看数值</p>
        </div>
        <div class="result-content" id="result-content" style="display:none;">
          <!-- 最佳匹配 -->
          <div class="best-match-section">
            <h2 class="section-title">🏆 最佳匹配</h2>
            <div class="player-card-xl" id="best-match-card">
              <!-- 动态填充 -->
            </div>
          </div>
          <!-- 其他推荐 -->
          <div class="other-matches-section">
            <h2 class="section-title">📋 其他推荐</h2>
            <div class="other-cards" id="other-cards">
              <!-- 动态填充 -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部 -->
    <footer class="footer">
      <span>Football Simulator © 2026 · 五大联赛球星数据参考 FIFA/FC 系列</span>
    </footer>
  </div>

  <script src="players.js"></script>
  <script src="app.js"></script>
</body>
</html>
